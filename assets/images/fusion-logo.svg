<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Three circles merging into one -->
  <circle cx="20" cy="25" r="12" fill="#667eea" opacity="0.8"/>
  <circle cx="35" cy="25" r="12" fill="#764ba2" opacity="0.8"/>
  <circle cx="27.5" cy="15" r="12" fill="#f093fb" opacity="0.8"/>
  
  <!-- Arrow pointing to result -->
  <path d="M 55 25 L 70 25 L 65 20 M 70 25 L 65 30" 
        stroke="url(#grad1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Result circle -->
  <circle cx="85" cy="25" r="14" fill="url(#grad1)"/>
  <text x="85" cy="30" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✓</text>
  
  <!-- Text -->
  <text x="110" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#333">
    Fusion AI
  </text>
</svg>
