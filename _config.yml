title: Fusion AI Harness
description: Multi-model response synthesis — query multiple LLMs and combine their outputs into superior answers
remote_theme: just-the-docs/just-the-docs@v0.10.0

# Site URL (update after repo creation)
url: https://nordgren.github.io
baseurl: /fusion-ai-harness

# Color scheme: light, dark, or auto (follows system)
color_scheme: light

# Logo and favicon
logo: "/assets/images/fusion-logo.svg"

# Enable search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Aux links (top right)
aux_links:
  GitHub: https://github.com/nordgren/fusion-ai-harness

aux_links_new_tab: true

# Footer
footer_content: "MIT License • Built with <a href=\"https://just-the-docs.com\">Just the Docs</a>"

# Navigation
nav_sort: case_sensitive
back_to_top: true
back_to_top_text: "↑ Top"

# Code highlighting
highlighter: rouge
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Collections for organized content
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

# Default front matter
defaults:
  - scope:
      path: "docs"
      type: "docs"
    values:
      layout: "default"

# Callouts
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Mermaid diagrams
mermaid:
  version: "10.6.0"

# Exclude from build
exclude:
  - src/
  - tests/
  - configs/
  - "*.py"
  - requirements.txt
  - Gemfile
  - Gemfile.lock
  - "*.puml"
  - docs/PLAN.md
  - docs/THEORY.md
  - README.md
